    <style>
      body {
        background-color: #131313;
        color: #e5e2e1;
        overflow-x: hidden;
      }
      .glass-card {
        background: rgba(28, 28, 28, 0.8);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(212, 175, 55, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      .matte-gold-btn {
        background: linear-gradient(135deg, #e5c158 0%, #d4af37 100%);
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        transition: all 0.2s ease;
      }
      .matte-gold-btn:active {
        transform: scale(0.95);
      }
      .gold-glow-divider {
        height: 1px;
        background: radial-gradient(circle, rgba(242, 202, 80, 0.4) 0%, rgba(242, 202, 80, 0) 70%);
        margin: 32px 0;
      }
      .status-pulse {
        position: relative;
      }
      .status-pulse::after {
        content: "";
        position: absolute;
        width: 8px;
        height: 8px;
        background: #4ae176;
        border-radius: 50%;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(2.5);
          opacity: 0;
        }
      }
      .gold-dust-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
      }
      .particle {
        position: absolute;
        background: rgba(212, 175, 55, 0.4);
        border-radius: 50%;
        filter: blur(1px);
        animation: moveUp var(--duration) linear infinite;
      }
      @keyframes moveUp {
        from {
          transform: translateY(100vh);
          opacity: 0;
        }
        50% {
          opacity: 0.8;
        }
        to {
          transform: translateY(-10vh);
          opacity: 0;
        }
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
    </style>

    <!-- Floating Footer -->
    <script>
      // Gold Dust Particle System
      const container = document.getElementById("goldDust");
      const particleCount = 40;

      function createParticle() {
        const p = document.createElement("div");
        p.className = "particle";
        const size = Math.random() * 3 + 1;
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.left = `${Math.random() * 100}vw`;
        const duration = Math.random() * 5 + 5;
        p.style.setProperty("--duration", `${duration}s`);
        p.style.opacity = Math.random();

        container.appendChild(p);

        setTimeout(() => {
          p.remove();
          createParticle();
        }, duration * 1000);
      }

      for (let i = 0; i < particleCount; i++) {
        setTimeout(createParticle, Math.random() * 5000);
      }

      // Timer Logic
      let seconds = 522; // 08:42
      const timerElement = document.getElementById("timer");

      if (timerElement) {
        setInterval(() => {
          seconds++;
          const mins = Math.floor(seconds / 60);
          const secs = seconds % 60;
          timerElement.textContent = `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
        }, 1000);
      }
